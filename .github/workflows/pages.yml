name: Build and deploy Zola site

on:
  push:
    branches: ["main"]
    tags: ["release-*", "v*"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build release and main preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          path: source-main
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release tag
        id: release
        working-directory: source-main
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            release_ref="${GITHUB_REF_NAME}"
          else
            release_ref="$(git for-each-ref --sort=-creatordate --format='%(refname:short)' refs/tags/release-* refs/tags/v* | head -n 1)"
          fi

          if [[ -z "${release_ref}" ]]; then
            echo "No release tag found. Create a tag matching release-* or v* before deploying."
            exit 1
          fi

          echo "Using release ref: ${release_ref}"
          echo "ref=${release_ref}" >> "${GITHUB_OUTPUT}"

      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release.outputs.ref }}
          path: source-release

      - name: Install Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola@0.19.2

      - name: Build release site
        working-directory: source-release
        run: zola build --base-url "https://vintitres.github.io" --output-dir ../site

      - name: Build main test site
        working-directory: source-main
        run: zola build --base-url "https://vintitres.github.io/test_main" --output-dir ../site/test_main

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
