name: Deploy Zola site to GitHub Pages

on:
  push:
    branches: ["main", "staging"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: source-main

      - name: Checkout staging
        uses: actions/checkout@v4
        with:
          ref: staging
          path: source-staging

      - name: Install Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola@0.19.2

      - name: Build main site
        working-directory: source-main
        run: zola build --base-url "https://vintitres.github.io" --output-dir ../site

      - name: Build staging site
        working-directory: source-staging
        run: zola build --base-url "https://vintitres.github.io/staging" --output-dir ../site/staging

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
