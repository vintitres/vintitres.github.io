{% set contact = load_data(path='data/contact.toml') %}
<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SportsActivityLocation",
    "@id": "{{ get_url(path='/') | safe }}#business",
    "name": "{{ config.title }}",
    "url": "{{ get_url(path='/') | safe }}",
    "description": "{{ config.extra.description }}",
    "image": "{{ get_url(path='logo.jpg') | safe }}",
    "logo": "{{ get_url(path='logo.jpg') | safe }}",
    "telephone": "{{ contact.phone_schema }}",
    "email": "{{ contact.email_label }}",
    "founder": {
      "@type": "Person",
      "name": "{{ contact.owner_name }}"
    },
    "sameAs": [
      {%- set social_items = contact.items | filter(attribute="is_social", value=true) -%}
      {%- for item in social_items -%}
        "{{ item.url | safe }}"{%- if not loop.last -%},{%- endif -%}
      {%- endfor -%}
    ]
  }
</script>
